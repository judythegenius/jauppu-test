<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoForge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>LottoForge</h1>
        <p>Your personal lottery number generator.</p>
        <lotto-ticket></lotto-ticket>
        <button id="generator">Generate New Numbers</button>

        <section id="comments-section">
            <h2>Live Comments</h2>
            <div id="comment-list"></div>
            <form id="comment-form">
                <input type="text" id="comment-input" placeholder="Say something..." required>
                <button type="submit">Post</button>
            </form>
        </section>
    </main>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
